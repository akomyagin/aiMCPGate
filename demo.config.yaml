# =============================================================================
# DEMO-ONLY CONFIG — НЕ ДЛЯ РЕАЛЬНОЙ ЭКСПЛУАТАЦИИ.
#
# Этот конфиг существует исключительно для sandbox-интроспекции в каталогах
# MCP-серверов (Glama.ai и т.п.): sandbox поднимает шлюз без единого
# настоящего upstream, а Registry.Start осознанно завершается ошибкой, если ни
# один upstream не поднялся. Поэтому единственный upstream здесь — сам бинарь
# mcp-gate в роли встроенного демо-echo-сервера (скрытая подкоманда
# `__demo-echo`): два игрушечных инструмента (echo, ping), никакого доступа к
# ФС, сети или процессам.
#
# Для реальной работы используйте собственный конфиг по образцу
# config.example.yaml — этот не содержит ни одного настоящего upstream.
# =============================================================================

transport: stdio
log_level: info

upstreams:
  # Бинарь шлюза запускает сам себя как обычный stdio-upstream. Путь
  # /mcp-gate — АБСОЛЮТНЫЙ и совпадает с тем, куда Dockerfile кладёт бинарь
  # (COPY mcp-gate /mcp-gate); он НЕ резолвится относительно cwd процесса,
  # так что демо-конфиг не зависит от рабочей директории контейнера.
  - name: demo-echo
    kind: stdio
    command: /mcp-gate
    args: ["__demo-echo"]
    enabled: true
