# aiMCPGate example configuration.
#
# Secrets (tokens) are referenced with ${ENV_VAR} and resolved from the
# environment / a local .env at load time — never commit real secrets here.

# Client-facing transport: how a client (Claude Code, Cursor, ...) reaches the
# gateway. "stdio" (Phase 1) launches the gateway as a subprocess; "http" (Phase 2)
# exposes a Streamable HTTP endpoint at http://<listen_addr>/mcp.
transport: stdio            # stdio | http
# Loopback-only by default. To serve over the network set a routable address
# AND set auth_token so the endpoint is not open to the whole LAN.
listen_addr: "127.0.0.1:28080" # only used when transport: http
# auth_token protects the HTTP endpoint: every request must carry
# "Authorization: Bearer <token>". Use ${ENV_VAR} — never commit the value.
# Omit (or leave empty) for loopback-only deployments where network auth is
# unnecessary.
# auth_token: ${AIMCPGATE_TOKEN}

# Where the JSON-lines tool-call log is written. Empty → stderr only.
# `mcp-gate logs --file <this>` reads it back. Relative paths (like this one)
# resolve against THIS config file's directory, not the cwd mcp-gate was
# launched from — so serve can be run from anywhere and still find its files.
log_file: ./logs/calls.jsonl
log_level: info             # debug | info | warn | error
call_timeout: 30s           # bounds one upstream request (handshake/list/call)

# Auto-restart policy for stdio upstreams whose child process dies while the
# gateway runs (a single GLOBAL policy — every upstream restart replays the exact
# config it was first launched with). HTTP upstreams have no process to restart.
# Defaults if omitted: enabled, 1s→30s exponential backoff, 5 attempts.
# restart:
#   enabled: true
#   initial_backoff: 1s
#   max_backoff: 30s
#   max_attempts: 5           # 0 = retry forever

# `mcp-gate skill` prints a built-in deployment-independent guide by default.
# Set this to override with your own file (org policy notes, translation, ...);
# `mcp-gate skill` with no config gives you the default text as a starting point.
# skill_file: ./skill.md

upstreams:
  # stdio upstream: a local MCP server launched as a child process.
  - name: filesystem                       # ^[a-zA-Z0-9_-]+$ (namespacing)
    command: npx
    args: ["-y", "@modelcontextprotocol/server-filesystem", "/home/user"]
    enabled: true

  - name: github
    command: github-mcp-server
    env:
      GITHUB_TOKEN: ${GITHUB_TOKEN}         # from the environment, not hardcoded
    enabled: true

  # http upstream (Phase 2): an already-running MCP server reached over
  # Streamable HTTP. Set `url` instead of `command` (exactly one of the two).
  # `kind` is optional — it is inferred as http when a url is present.
  - name: remote
    url: https://mcp.example.com/mcp
    headers:
      Authorization: "Bearer ${REMOTE_MCP_TOKEN}"   # secret, never logged
    enabled: true
