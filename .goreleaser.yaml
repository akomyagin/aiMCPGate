# goreleaser v2 configuration for aiMCPGate.
# Docs: https://goreleaser.com
version: 2

before:
  hooks:
    - go mod download

builds:
  - id: mcp-gate
    main: ./cmd
    binary: mcp-gate
    # modernc.org's pure-Go stdlib deps aside, aiMCPGate has no CGO dependency at
    # all (no SQLite here) — CGO_ENABLED=0 is still stated explicitly so cross
    # compilation to darwin/windows never silently depends on a C toolchain.
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}

archives:
  - id: mcp-gate
    name_template: "mcp-gate_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

# OCI images for the MCP registry / Glama.ai (Stage 12): one image per arch
# pushed to ghcr.io, then stitched into multi-arch manifests below. The
# workflow (.github/workflows/release.yml) logs docker in to ghcr.io and sets
# up buildx/qemu before goreleaser runs.
dockers:
  - id: mcp-gate-amd64
    use: buildx
    goos: linux
    goarch: amd64
    dockerfile: Dockerfile
    extra_files:
      - demo.config.yaml
    image_templates:
      - "ghcr.io/akomyagin/aimcpgate:{{ .Version }}-amd64"
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.source=https://github.com/akomyagin/aiMCPGate"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .Commit }}"
  - id: mcp-gate-arm64
    use: buildx
    goos: linux
    goarch: arm64
    dockerfile: Dockerfile
    extra_files:
      - demo.config.yaml
    image_templates:
      - "ghcr.io/akomyagin/aimcpgate:{{ .Version }}-arm64"
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.source=https://github.com/akomyagin/aiMCPGate"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .Commit }}"

docker_manifests:
  - name_template: "ghcr.io/akomyagin/aimcpgate:{{ .Version }}"
    image_templates:
      - "ghcr.io/akomyagin/aimcpgate:{{ .Version }}-amd64"
      - "ghcr.io/akomyagin/aimcpgate:{{ .Version }}-arm64"
  - name_template: "ghcr.io/akomyagin/aimcpgate:latest"
    image_templates:
      - "ghcr.io/akomyagin/aimcpgate:{{ .Version }}-amd64"
      - "ghcr.io/akomyagin/aimcpgate:{{ .Version }}-arm64"

checksum:
  name_template: SHA256SUMS
  algorithm: sha256

changelog:
  use: github

release:
  github:
    owner: akomyagin
    name: aiMCPGate
