name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    # Job-level permissions REPLACE (not merge with) the workflow-level block,
    # so contents: write must be repeated here. packages: write is scoped to
    # this job only: goreleaser pushes the OCI images to ghcr.io (Stage 12);
    # npm-publish never touches GitHub Packages.
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.4"

      # qemu + buildx let goreleaser build the linux/arm64 image on the amd64
      # runner; the login lets it push both images and the multi-arch manifests
      # to ghcr.io (see `dockers:` / `docker_manifests:` in .goreleaser.yaml).
      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  npm-publish:
    # The npm wrapper (npm/) has no binaries of its own: its install.js
    # downloads the release archives + SHA256SUMS that goreleaser just
    # uploaded, so publishing only makes sense after that job succeeds.
    needs: goreleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          # setup-node writes an .npmrc that reads the token from
          # NODE_AUTH_TOKEN when registry-url is set.
          registry-url: "https://registry.npmjs.org"

      # package.json carries the placeholder 0.0.0-dev; stamp the tag's version
      # (without the v prefix) so install.js downloads the matching release.
      - name: Stamp package version from tag
        working-directory: npm
        run: npm version --no-git-tag-version "${GITHUB_REF_NAME#v}"

      # Until the secret is provisioned, skip publishing instead of failing
      # the release: the binaries and OCI images are already out by this point.
      - name: Check NPM_TOKEN configured
        id: npm_token_check
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "::warning::NPM_TOKEN secret is not set — skipping npm publish. Create it in repo settings (npm automation token) to enable."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.npm_token_check.outputs.skip != 'true'
        working-directory: npm
        env:
          # NPM_TOKEN is a repository secret that must be created manually in
          # GitHub repo settings (an npm automation token with publish rights
          # for the `aimcpgate` package). It is NOT provisioned by this repo.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish
